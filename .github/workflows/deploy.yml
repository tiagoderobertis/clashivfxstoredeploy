name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Debug directory structure
        run: |
          echo "Current directory structure:"
          ls -la
          echo "Checking for out directory:"
          if [ -d "out" ]; then
            echo "out directory exists"
            ls -la out/
          else
            echo "out directory does not exist, creating it"
            mkdir -p out
            echo "Created out directory"
          fi

      - name: Prepare for GitHub Pages
        run: |
          # Ensure out directory exists
          mkdir -p out

          # Create necessary files
          touch out/.nojekyll
          echo www.clashivfx.store > out/CNAME

          # If build didn't generate index.html, create a basic one
          if [ ! -f out/index.html ]; then
            echo "<html><head><meta http-equiv='refresh' content='0;url=/'></head><body>Redirecting...</body></html>" > out/index.html
          fi

          # Create a 404 page
          if [ ! -f out/404.html ]; then
            echo "<html><head><title>404 - Page Not Found</title></head><body style='font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #000; color: #FF7200;'><div style='text-align: center;'><h1>404 - Page Not Found</h1><p>The page you are looking for does not exist.</p><a href='/' style='color: #FF7200; text-decoration: underline;'>Go back to home</a></div></body></html>" > out/404.html
          fi

          # Copy build output if it's in a different location
          if [ ! -d "out" ] && [ -d ".next" ]; then
            cp -r .next/* out/
          fi

          # List files for verification
          echo "Contents of out directory:"
          ls -la out/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true
