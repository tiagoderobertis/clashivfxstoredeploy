name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        
      - name: Debug directory structure
        run: |
          echo "Current directory structure:"
          ls -la
          echo "Checking for out directory:"
          if [ -d "out" ]; then
            echo "out directory exists"
            ls -la out/
          else
            echo "out directory does not exist"
            if [ -d ".next" ]; then
              echo ".next directory exists"
              ls -la .next/
            fi
          fi

      - name: Create necessary files and structure
        run: |
          # Ensure out directory exists
          mkdir -p out
          
          # Create necessary files
          touch out/.nojekyll
          echo www.clashivfx.store > out/CNAME
          
          # Create a proper index.html in the root that redirects to the actual app
          cat > out/index.html << 'EOL'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ClashiVFX - Professional Video Effects</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #000;
                color: #FFE8CD;
              }
              .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
                text-align: center;
              }
              h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
                color: #FF7200;
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
                max-width: 600px;
              }
              .button {
                display: inline-block;
                background-color: #FF7200;
                color: #FFE8CD;
                padding: 12px 24px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: bold;
                transition: all 0.3s ease;
              }
              .button:hover {
                background-color: #FFE8CD;
                color: #000;
                box-shadow: 0 0 15px rgba(255, 232, 205, 0.6);
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>ClashiVFX</h1>
              <p>Professional effects presets and plugins for After Effects. One-click application to enhance your videos.</p>
              <a href="/app/" class="button">Enter Site</a>
            </div>
          </body>
          </html>
          EOL
          
          # Create a proper 404.html
          cat > out/404.html << 'EOL'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>404 - Página No Encontrada | ClashiVFX</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: linear-gradient(to bottom, #000000, #FF7200);
                color: #FFE8CD;
              }
              .container {
                text-align: center;
                padding: 2rem;
                max-width: 600px;
              }
              h1 {
                font-size: 3rem;
                margin-bottom: 1rem;
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
                opacity: 0.8;
              }
              a {
                display: inline-block;
                background-color: #FF7200;
                color: #FFE8CD;
                padding: 0.75rem 1.5rem;
                border-radius: 0.375rem;
                text-decoration: none;
                font-weight: bold;
                transition: all 0.3s ease;
              }
              a:hover {
                background-color: #FFE8CD;
                color: #000;
                box-shadow: 0 0 15px rgba(255, 232, 205, 0.6);
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>404 - Página No Encontrada</h1>
              <p>La página que estás buscando no existe o ha sido movida.</p>
              <a href="/">Volver al Inicio</a>
            </div>
          </body>
          </html>
          EOL
          
          # Create app directory and copy the Next.js output there
          mkdir -p out/app
          
          # Copy all Next.js generated files to the app directory
          if [ -d "out" ]; then
            # If there are files in out (other than the ones we just created)
            find out -type f -not -path "*/\.*" -not -name "index.html" -not -name "404.html" -not -name "CNAME" -exec cp -r {} out/app/ \;
          fi
          
          # If .next directory exists, copy its contents to app
          if [ -d ".next" ]; then
            cp -r .next/* out/app/
          fi
          
          # List files for verification
          echo "Contents of out directory:"
          ls -la out/
          echo "Contents of out/app directory:"
          ls -la out/app/ || echo "app directory is empty"

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true

