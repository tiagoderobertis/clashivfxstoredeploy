name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npm run build
        
      # Verificar el contenido de la carpeta out
      - name: List output directory
        run: ls -la out/
        
      # Asegurarnos de que existe un archivo index.html
      - name: Check for index.html
        run: |
          if [ -f "out/index.html" ]; then
            echo "index.html exists"
          else
            echo "WARNING: index.html does not exist!"
            # Crear un archivo index.html básico si no existe
            echo "<html><head><meta http-equiv='refresh' content='0;url=/index/'></head><body>Redirecting...</body></html>" > out/index.html
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: www.clashivfx.store

