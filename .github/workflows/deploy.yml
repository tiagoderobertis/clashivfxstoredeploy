name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build
        run: npm run build
        
      - name: Debug directory structure
        run: |
          echo "Current directory structure:"
          ls -la
          echo "Checking for out directory:"
          if [ -d "out" ]; then
            echo "out directory exists"
            ls -la out/
          else
            echo "out directory does not exist"
            if [ -d ".next" ]; then
              echo ".next directory exists"
              ls -la .next/
            fi
          fi

      - name: Create landing page
        run: |
          # Ensure out directory exists
          mkdir -p out
          mkdir -p out/store
          
          # Create necessary files
          touch out/.nojekyll
          echo www.clashivfx.store > out/CNAME
          
          # Create a simple landing page that redirects directly to the main site
          cat > out/index.html << 'EOL'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ClashiVFX - Professional Video Effects</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background-color: #000;
                color: #FFE8CD;
              }
              .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
                text-align: center;
              }
              h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
                color: #FF7200;
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
                max-width: 600px;
              }
              .button {
                display: inline-block;
                background-color: #FF7200;
                color: #FFE8CD;
                padding: 12px 24px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: bold;
                transition: all 0.3s ease;
              }
              .button:hover {
                background-color: #FFE8CD;
                color: #000;
                box-shadow: 0 0 15px rgba(255, 232, 205, 0.6);
              }
            </style>
            <!-- Añadir script para redirección automática después de un breve retraso -->
            <script>
              setTimeout(function() {
                window.location.href = "/store/";
              }, 3000); // Redirigir después de 3 segundos
            </script>
          </head>
          <body>
            <div class="container">
              <h1>ClashiVFX</h1>
              <p>Professional effects presets and plugins for After Effects. One-click application to enhance your videos.</p>
              <a href="/store/" class="button">Enter Site</a>
              <p style="margin-top: 20px; font-size: 0.9rem; opacity: 0.7;">Redirigiendo automáticamente en 3 segundos...</p>
            </div>
          </body>
          </html>
          EOL
          
          # Create store/index.html
          cat > out/store/index.html << 'EOL'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>ClashiVFX Store - Professional Video Effects</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                background: linear-gradient(to bottom, #000000, #FF7200);
                color: #FFE8CD;
                min-height: 100vh;
              }
              .container {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                min-height: 100vh;
                padding: 20px;
                text-align: center;
              }
              h1 {
                font-size: 2.5rem;
                margin-bottom: 1rem;
                color: #FF7200;
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
                max-width: 600px;
              }
              .products {
                display: flex;
                flex-wrap: wrap;
                justify-content: center;
                gap: 20px;
                margin-top: 40px;
                max-width: 1200px;
              }
              .product-card {
                background-color: rgba(0, 0, 0, 0.5);
                border-radius: 8px;
                padding: 20px;
                width: 300px;
                text-align: left;
                border: 1px solid rgba(255, 114, 0, 0.3);
              }
              .product-card h3 {
                color: #FF7200;
                margin-top: 0;
              }
              .product-card p {
                font-size: 0.9rem;
                margin-bottom: 1rem;
              }
              .price {
                font-size: 1.5rem;
                font-weight: bold;
                margin-bottom: 1rem;
              }
              .button {
                display: inline-block;
                background-color: #FF7200;
                color: #FFE8CD;
                padding: 10px 20px;
                border-radius: 6px;
                text-decoration: none;
                font-weight: bold;
                transition: all 0.3s ease;
              }
              .button:hover {
                background-color: #FFE8CD;
                color: #000;
                box-shadow: 0 0 15px rgba(255, 232, 205, 0.6);
              }
              .header {
                position: fixed;
                top: 0;
                left: 0;
                right: 0;
                background-color: rgba(0, 0, 0, 0.8);
                padding: 15px 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
                z-index: 100;
                border-bottom: 1px solid rgba(255, 114, 0, 0.3);
              }
              .logo {
                color: #FF7200;
                font-weight: bold;
                font-size: 1.5rem;
                text-decoration: none;
              }
              .nav {
                display: flex;
                gap: 20px;
              }
              .nav a {
                color: #FFE8CD;
                text-decoration: none;
                transition: color 0.3s ease;
              }
              .nav a:hover {
                color: #FF7200;
              }
            </style>
          </head>
          <body>
            <header class="header">
              <a href="/" class="logo">ClashiVFX</a>
              <nav class="nav">
                <a href="/">Home</a>
                <a href="/store/">Store</a>
                <a href="/community/">Community</a>
                <a href="/about/">About</a>
                <a href="/contact/">Contact</a>
              </nav>
            </header>
            <div class="container">
              <h1>ClashiVFX Store</h1>
              <p>Browse our collection of professional video effects, presets, and plugins for After Effects.</p>
              
              <div class="products">
                <div class="product-card">
                  <h3>After Effects Shake Presets</h3>
                  <p>Complete package of shake presets for After Effects. Add dynamic movement to your videos with a single click.</p>
                  <div class="price">$19.99</div>
                  <a href="#" class="button">Get Now</a>
                </div>
                
                <div class="product-card">
                  <h3>3D Text Presets</h3>
                  <p>3D text preset package with Element 3D plugin for After Effects. Create stunning 3D text effects easily.</p>
                  <div class="price">$24.99</div>
                  <a href="#" class="button">Get Now</a>
                </div>
                
                <div class="product-card">
                  <h3>Time-Saving Plugins</h3>
                  <p>Exclusive plugins to optimize your editing time. Streamline your workflow and focus on creativity.</p>
                  <div class="price">$29.99</div>
                  <a href="#" class="button">Get Now</a>
                </div>
              </div>
            </div>
          </body>
          </html>
          EOL
          
          # Create a proper 404.html
          cat > out/404.html << 'EOL'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>404 - Página No Encontrada | ClashiVFX</title>
            <style>
              body {
                font-family: Arial, sans-serif;
                margin: 0;
                padding: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                min-height: 100vh;
                background: linear-gradient(to bottom, #000000, #FF7200);
                color: #FFE8CD;
              }
              .container {
                text-align: center;
                padding: 2rem;
                max-width: 600px;
              }
              h1 {
                font-size: 3rem;
                margin-bottom: 1rem;
              }
              p {
                font-size: 1.2rem;
                margin-bottom: 2rem;
                opacity: 0.8;
              }
              a {
                display: inline-block;
                background-color: #FF7200;
                color: #FFE8CD;
                padding: 0.75rem 1.5rem;
                border-radius: 0.375rem;
                text-decoration: none;
                font-weight: bold;
                transition: all 0.3s ease;
              }
              a:hover {
                background-color: #FFE8CD;
                color: #000;
                box-shadow: 0 0 15px rgba(255, 232, 205, 0.6);
              }
            </style>
          </head>
          <body>
            <div class="container">
              <h1>404 - Página No Encontrada</h1>
              <p>La página que estás buscando no existe o ha sido movida.</p>
              <a href="/">Volver al Inicio</a>
            </div>
          </body>
          </html>
          EOL

          # Copy Next.js generated files if they exist
          if [ -d ".next/static" ]; then
            mkdir -p out/_next/static
            cp -R .next/static/* out/_next/static/
          fi

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true

