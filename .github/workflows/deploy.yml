name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install --force

      - name: Build
        run: npm run build
        
      # Verificar qué directorios se crearon
      - name: List directories
        run: ls -la
        
      # Verificar si existe la carpeta out o si se está usando otro nombre
      - name: Check build output
        run: |
          if [ -d "out" ]; then
            echo "out directory exists"
            ls -la out/
          elif [ -d ".next" ]; then
            echo ".next directory exists (SSR build instead of static export)"
            ls -la .next/
            # Crear carpeta out y copiar contenido necesario
            mkdir -p out
            cp -r .next/static out/
            # Crear un index.html básico
            echo "<html><head><meta http-equiv='refresh' content='0;url=/'></head><body>Redirecting...</body></html>" > out/index.html
          else
            echo "No build output found!"
            # Crear una carpeta out de emergencia con un archivo index.html
            mkdir -p out
            echo "<html><body>Site is being built...</body></html>" > out/index.html
          fi

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          cname: www.clashivfx.store

