name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci || npm install --legacy-peer-deps

      - name: Build
        run: npm run build

      - name: Prepare for GitHub Pages
        run: |
          touch out/.nojekyll
          echo www.clashivfx.store > out/CNAME
          # Asegurarse de que index.html existe en la raíz
          if [ ! -f out/index.html ]; then
            if [ -f out/home/index.html ]; then
              cp out/home/index.html out/index.html
            elif [ -f out/index/index.html ]; then
              cp out/index/index.html out/index.html
            else
              echo "<html><head><meta http-equiv='refresh' content='0;url=/home/'></head><body>Redirecting...</body></html>" > out/index.html
            fi
          fi
          # Crear un archivo 404.html personalizado si no existe
          if [ ! -f out/404.html ]; then
            echo "<html><head><title>404 - Page Not Found</title></head><body style='font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #000; color: #FF7200;'><div style='text-align: center;'><h1>404 - Page Not Found</h1><p>The page you are looking for does not exist.</p><a href='/' style='color: #FF7200; text-decoration: underline;'>Go back to home</a></div></body></html>" > out/404.html
          fi
          # Listar archivos para verificar
          ls -la out/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: out
          branch: gh-pages
          clean: true

